<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Air-Con Login</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f4f4; }
        .login-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); text-align: center; width: 300px; }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #28a745; margin-bottom: 20px; object-fit: cover; }
        input { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        .btn { background-color: #28a745; color: white; padding: 12px; border: none; border-radius: 5px; width: 100%; cursor: pointer; font-size: 16px; }
        .forgot { color: blue; font-size: 14px; text-decoration: none; display: block; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="1000064267.jpg" alt="Oasis Logo" class="logo">
        <h2>Oasis Login</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button class="btn">Login</button>
        <a href="#" class="forgot">Forgot Password?</a>
    </div>
</body>
</html>
