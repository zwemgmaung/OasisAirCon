<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Air-Con System</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); text-align: center; width: 340px; }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #28a745; margin-bottom: 25px; object-fit: cover; }
        h2 { color: #212529; margin: 0; font-size: 22px; }
        p { color: #6c757d; margin-bottom: 20px; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; }
        .btn { background-color: #28a745; color: white; padding: 12px; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="1000064267.png" alt="Oasis Logo" class="logo">
        <h2>Oasis Air-Con</h2>
        <p>Sales and Service System</p>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button class="btn" onclick="checkLogin()">LOGIN</button>
    </div>
    <script>
        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            if (user === "oasis" && pass === "oasis2000") {
                localStorage.setItem('isLoggedIn', 'true');
                window.location.href = "dashboard.html";
            } else { alert("Username သို့မဟုတ် Password မှားယွင်းနေပါသည်။"); }
        }
    </script>
</body>
</html>
