<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Air-Con Sales & Service</title>
    <style>
        body { font-family: 'Pyidaungsu', sans-serif; padding: 0; margin: 0; background: #f4f7f6; }
        .header { background: #004a99; color: white; padding: 30px 15px; text-align: center; border-radius: 0 0 20px 20px; }
        .content { padding: 20px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h2 { color: #004a99; margin-top: 0; }
        .btn { display: block; background: #28a745; color: white; text-align: center; padding: 12px; text-decoration: none; border-radius: 8px; font-weight: bold; margin-top: 10px; }
        p { color: #555; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Oasis Air-Con</h1>
        <p>Sales and Service Business App</p>
    </div>

    <div class="content">
        <div class="card">
            <h2>လုပ်ငန်းစီမံချက်များ</h2>
            <p>ကိုကို့ရဲ့ အဲကွန်းပြုပြင်ရေးနဲ့ တပ်ဆင်ရေး အလုပ်စာရင်းများကို ဒီနေရာမှာ စနစ်တကျ မှတ်တမ်းတင်ထားနိုင်ပါပြီ။</p>
            <a href="#" class="btn">အလုပ်သစ်ထည့်ရန်</a>
        </div>

        <div class="card">
            <h2>Service Tracking</h2>
            <p>လက်ရှိ ဆောင်ရွက်နေတဲ့ အလုပ်များရဲ့ တိုးတက်မှုကို ဒီကနေ စောင့်ကြည့်စစ်ဆေးနိုင်ပါတယ်။</p>
        </div>
    </div>
</body>
</html>
