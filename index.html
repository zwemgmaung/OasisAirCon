<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Air-Con Business App</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f0f2f5; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 24px rgba(0,0,0,0.1); text-align: center; width: 340px; }
        .logo { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #28a745; margin-bottom: 25px; object-fit: cover; }
        h2 { color: #212529; margin-bottom: 5px; font-size: 22px; }
        p { color: #6c757d; margin-bottom: 25px; font-size: 14px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ced4da; border-radius: 6px; box-sizing: border-box; font-size: 15px; }
        input:focus { outline: none; border-color: #28a745; box-shadow: 0 0 0 2px rgba(40, 167, 69, 0.2); }
        .btn { background-color: #28a745; color: white; padding: 12px; border: none; border-radius: 6px; width: 100%; cursor: pointer; font-size: 16px; font-weight: 600; margin-top: 15px; transition: background 0.3s; }
        .btn:hover { background-color: #218838; }
        .error-msg { color: #dc3545; font-size: 13px; margin-top: 10px; display: none; }
        .footer-text { margin-top: 25px; font-size: 12px; color: #adb5bd; }
    </style>
</head>
<body>
    <div class="login-card">
        <img src="1000064270.png" alt="Oasis Logo" class="logo">
        <h2>Oasis Air-Con</h2>
        <p>Sales and Service System</p>
        
        <input type="text" id="username" placeholder="Username" autocomplete="off">
        <input type="password" id="password" placeholder="Password">
        
        <div id="error" class="error-msg">Incorrect username or password.</div>
        
        <button class="btn" onclick="checkLogin()">LOGIN</button>
        
        <div class="footer-text">Developed by Oasis Engineering Team</div>
    </div>

    <script>
        function checkLogin() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error');

            // Default Credentials: oasis / oasis2000
            if (user === "oasis" && pass === "oasis2000") {
                error.style.display = "none";
                // Redirect to Dashboard
                window.location.href = "dashboard.html"; 
            } else {
                error.style.display = "block";
            }
        }
    </script>
</body>
</html>
