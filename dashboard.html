<div id="staffTab" class="hidden">
    <div class="card">
        <h3>ဝန်ထမ်း အချက်အလက် အသစ်သွင်းရန် (New Staff Entry)</h3>
        
        <div class="form-group">
            <label>ဓာတ်ပုံ တင်ရန် (Staff Photo)</label>
            <input type="file" id="st-photo" accept="image/*">
        </div>
        
        <div class="form-group">
            <input type="text" id="st-name" placeholder="အမည် (Full Name)">
        </div>
        
        <div class="grid-2">
            <div class="form-group">
                <select id="st-role">
                    <option value="Technician">Technician</option>
                    <option value="Helper">Helper</option>
                    <option value="Leader">Leader</option>
                    <option value="Manager">Manager</option>
                    <option value="MD">MD</option>
                    <option value="Clerk">Clerk</option>
                </select>
            </div>
            <div class="form-group">
                <input type="text" id="st-phone" placeholder="ဖုန်းနံပါတ် (Phone Number)">
            </div>
        </div>
        
        <div class="form-group">
            <input type="text" id="st-addr" placeholder="နေရပ်လိပ်စာ (Address)">
        </div>
        
        <div class="form-group">
            <textarea id="st-note" placeholder="မှတ်ချက် (Remark/Note)" rows="2"></textarea>
        </div>
        
        <button class="btn-green" onclick="addStaffWithPhoto()">သိမ်းဆည်းမည် (Save Staff Record)</button>
    </div>
    
    <div id="staffList" class="card">
        <h4>ဝန်ထမ်း စာရင်း (Staff Directory)</h4>
        <div id="staffItems"></div>
    </div>
</div>

<script>
    // --- PROFESSIONAL STAFF LOGIC ---
    async function addStaffWithPhoto() {
        const file = document.getElementById('st-photo').files[0];
        const name = document.getElementById('st-name').value;
        const role = document.getElementById('st-role').value;
        const phone = document.getElementById('st-phone').value;
        const addr = document.getElementById('st-addr').value;
        const remark = document.getElementById('st-note').value;

        // အမည် မပါရင် Alert ပေးမယ် (Professional Version)
        if(!name) {
            return alert("ကျေးဇူးပြု၍ ဝန်ထမ်းအမည် ထည့်သွင်းပေးပါရန်။ (Please enter staff name)");
        }

        let photoData = "";
        if (file) {
            const reader = new FileReader();
            photoData = await new Promise((resolve) => {
                reader.onload = (e) => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        const data = {
            name, role, phone, addr, remark,
            photo: photoData,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };

        db.collection("staff").add(data).then(() => {
            alert("ဝန်ထမ်းစာရင်း သိမ်းဆည်းမှု အောင်မြင်ပါသည်။ (Staff record saved successfully)");
            // ဖောင်ကို ပြန်ရှင်းမယ်
            document.getElementById('st-name').value = '';
            document.getElementById('st-phone').value = '';
            document.getElementById('st-addr').value = '';
            document.getElementById('st-note').value = '';
            document.getElementById('st-photo').value = '';
            loadStaffList();
        }).catch(err => alert("Error: " + err));
    }

    function loadStaffList() {
        db.collection("staff").orderBy("createdAt", "desc").onSnapshot(snap => {
            const container = document.getElementById('staffItems');
            if (snap.empty) {
                container.innerHTML = "<p style='text-align:center; font-size:12px; color:gray;'>ဝန်ထမ်းစာရင်း မရှိသေးပါ။</p>";
                return;
            }
            container.innerHTML = snap.docs.map(doc => {
                const s = doc.data();
                return `
                    <div style="display:flex; gap:12px; border-bottom:1px solid #eee; padding:12px 0; align-items:center;">
                        <img src="${s.photo || 'https://via.placeholder.com/50'}" style="width:50px; height:50px; border-radius:50%; object-fit:cover; border:1px solid #ddd;">
                        <div style="font-size:12px; flex:1;">
                            <strong style="color:var(--p-green);">${s.name}</strong> (${s.role})<br>
                            📞 ${s.phone || '-'} | 📍 ${s.addr || '-'}<br>
                            <small style="display:block; margin-top:3px; color:#666; font-style:italic;">Remark: ${s.remark || '-'}</small>
                        </div>
                    </div>
                `;
            }).join('');
        });
    }
</script>
