<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis AC Master Sync Pro v2.5.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p-green: #28a745; --bg: #ffffff; --text: #333; --card: #f8f9fa; --border: #ddd; }
        [data-theme="dark"] { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333; }
        body { font-family: Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 70px; }
        .header { background: var(--p-green); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 2000; }
        .logo-img { width: 35px; height: 35px; border-radius: 50%; border: 2px solid white; object-fit: cover; background: white; }
        .nav-tabs { display: flex; overflow-x: auto; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 55px; z-index: 1000; }
        .tab-btn { padding: 15px; flex: none; text-align: center; cursor: pointer; font-weight: bold; font-size: 11px; color: #666; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--p-green); border-bottom-color: var(--p-green); }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; overflow: hidden; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 12px; color: var(--p-green); }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); box-sizing: border-box; margin-bottom: 10px; }
        .btn-green { background: var(--p-green); color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .hidden { display: none !important; }
        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; justify-content: center; align-items: center; z-index: 3000; }
        .modal-content { background: var(--card); padding: 20px; border-radius: 12px; width: 92%; max-width: 400px; overflow-y: auto; max-height: 85vh; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: bold; color: white; display: inline-block; margin-top: 5px; }
        .bg-pending { background: #ffc107; color: #000; }
        .bg-done { background: #28a745; }
        .st-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 0.5px solid var(--border); font-size: 12px; align-items: flex-start; }
        .td-left { font-weight: bold; color: var(--p-green); width: 42%; text-align: left; }
        .td-mid { width: 6%; text-align: center; font-weight: bold; color: var(--p-green); }
        .td-right { width: 52%; text-align: right; }
        .about-header { font-weight: bold; color: var(--p-green); margin-top: 20px; margin-bottom: 8px; border-bottom: 1.5px solid var(--p-green); padding-bottom: 4px; font-size: 13px; }
    </style>
</head>
<body data-theme="dark">
<div class="header">
    <div style="display:flex; align-items:center; gap:8px;"><img src="1000064267.png" class="logo-img"><span style="font-weight:bold; font-size:10px;">KO HTAY AUNG (OASIS) AC SERVICE</span></div>
    <div style="display:flex; gap:10px; align-items:center;"><button onclick="toggleTheme()" style="background:none; border:none; color:white; font-size:18px;">🌓</button></div>
</div>
<div class="nav-tabs">
    <div class="tab-btn active" onclick="showTab('home')" id="t-home">HOME</div>
    <div class="tab-btn" onclick="showTab('jobs')" id="t-jobs">JOBS</div>
    <div class="tab-btn" onclick="showTab('service')" id="t-service">ENTRY</div>
    <div class="tab-btn" onclick="showTab('purchase')" id="t-purchase">PURCHASE</div>
    <div class="tab-btn" onclick="showTab('sale')" id="t-sale">SALE</div>
    <div class="tab-btn" onclick="showTab('staff')" id="t-staff">STAFF</div>
    <div class="tab-btn" onclick="showTab('attendance')" id="t-attendance">ATTEND</div>
    <div class="tab-btn" onclick="showTab('settings')" id="t-settings">SETTINGS</div>
</div>
<div class="container">
    <div id="homeTab">
        <div class="card" style="text-align:center;"><h3>Daily Dashboard</h3><p style="color:var(--p-green); font-size:11px; font-weight:bold;">Today: <span id="currentDateDisp"></span></p><div id="dailyFinanceDisplay" style="padding:12px; background:var(--bg); border-radius:8px; border:1px solid var(--border);">Updating...</div></div>
        <div class="card"><h4>Full Master Report</h4><div id="monthlyStats">Loading...</div><div class="grid-2" style="margin-top:10px;"><button class="btn-green" onclick="exportMasterPDF()">Export Master PDF</button><button class="btn-green" style="background:#4285f4;" onclick="updateFinance()">Master Sync</button></div></div>
    </div>
    <div id="jobsTab" class="hidden"><div id="jobMasterList">Loading...</div></div>
    <div id="serviceTab" class="hidden">
        <div class="card"><h3>New Service Entry</h3><div class="grid-2"><input type="text" id="j-name" placeholder="Name"><input type="text" id="j-phone" placeholder="Phone"></div><textarea id="j-addr" rows="2" placeholder="Address"></textarea><div class="grid-2"><select id="j-app"><option>Air-Con</option><option>Refrigerator</option><option>Washing Machine</option></select><input type="text" id="j-brand" placeholder="Brand"></div><div class="grid-2"><input type="text" id="j-hp" placeholder="HP/Model"><input type="text" id="j-gas" placeholder="Gas Type"></div><textarea id="j-desc" rows="2" placeholder="Problem"></textarea><label>Staff</label><div id="staffChecks" style="border:1px solid var(--border); padding:10px; border-radius:6px; max-height:120px; overflow-y:auto; margin-bottom:10px;"></div><div class="grid-2"><div><label>Before</label><input type="file" accept="image/*" onchange="previewImg(this,'p-before')"><img id="p-before" style="width:100%;height:60px;object-fit:cover;background:#eee;"></div><div><label>After</label><input type="file" accept="image/*" onchange="previewImg(this,'p-after')"><img id="p-after" style="width:100%;height:60px;object-fit:cover;background:#eee;"></div></div><div class="grid-2"><input type="date" id="j-date"><input type="number" id="j-cost" placeholder="Cost"></div><select id="j-status"><option value="Pending">Pending</option><option value="Done">Done</option></select><button class="btn-green" onclick="saveJob()">SAVE SERVICE</button></div>
    </div>
    <div id="purchaseTab" class="hidden"><div class="card"><h3>Expense</h3><input type="text" id="p-name" placeholder="Name"><div class="grid-2"><input type="number" id="p-qty" placeholder="Qty" oninput="calcPur()"><input type="number" id="p-price" placeholder="Price" oninput="calcPur()"></div><input type="number" id="p-total" readonly placeholder="Total"><button class="btn-green" onclick="savePur()">SAVE</button><div id="purHistory" style="margin-top:15px;"></div></div></div>
    <div id="saleTab" class="hidden"><div class="card"><h3>Sale</h3><input type="text" id="s-name" placeholder="Item Name"><div class="grid-2"><input type="number" id="s-qty" placeholder="Qty" oninput="calcSale()"><input type="number" id="s-price" placeholder="Price" oninput="calcSale()"></div><input type="number" id="s-total" readonly placeholder="Total"><button class="btn-green" onclick="saveSale()">SAVE</button><div id="saleHistory" style="margin-top:15px;"></div></div></div>
    <div id="staffTab" class="hidden"><div id="staffList"></div><div class="card"><h4>Add Staff</h4><input type="text" id="st-name" placeholder="Name"><div class="grid-2"><select id="st-role"><option>MD</option><option>Manager</option><option>Leader</option><option>Co-Leader</option><option>Helper</option></select><input type="number" id="st-rate" placeholder="Rate"></div><button class="btn-green" onclick="addStaff()">ADD STAFF</button></div></div>
    <div id="attendanceTab" class="hidden"><div class="card"><h3>Attendance</h3><input type="date" id="att-date" onchange="loadStaffForAttendance()"><div id="attTableContainer" style="margin-top:10px;"></div><button class="btn-green" style="margin-top:15px;" onclick="saveAttendance()">SAVE TODAY</button></div></div>
    <div id="settingsTab" class="hidden"><div class="card"><h3>Settings</h3><p>Version 2.5.0</p></div></div>
</div>
<div id="jobModal" class="modal"><div class="modal-content"><h3>Edit Job</h3><div id="jobDetailView"></div><hr><div class="grid-2"><input type="number" id="edit-j-cost"><select id="edit-j-status"><option value="Pending">Pending</option><option value="Done">Done</option></select></div><button class="btn-green" onclick="updateJob()">UPDATE</button><button class="btn-green" onclick="deleteJob()" style="background:red;">DELETE</button><button class="btn-green" onclick="closeModal('jobModal')" style="background:#888;">CLOSE</button></div></div>
<div id="staffModal" class="modal"><div class="modal-content"><h3>Edit Staff</h3><input type="hidden" id="m-id"><input type="text" id="m-name"><div class="grid-2"><select id="m-role"><option>MD</option><option>Manager</option><option>Leader</option><option>Co-Leader</option><option>Helper</option></select><input type="number" id="m-rate"></div><button class="btn-green" onclick="updateStaff()">UPDATE</button><button class="btn-green" onclick="deleteStaff()" style="background:red;">DELETE</button><button class="btn-green" onclick="closeModal('staffModal')" style="background:#888;">CLOSE</button></div></div>

<script>
    const firebaseConfig = { apiKey: "AIzaSyAOgPQkaq0mLdzi9jNZK-oRCEa_VsmD_cE", authDomain: "oasis-ac-service.firebaseapp.com", projectId: "oasis-ac-service", storageBucket: "oasis-ac-service.firebasestorage.app", messagingSenderId: "1039018990829", appId: "1:1039018990829:web:bffe0ea0269bfbded780e4" };
    firebase.initializeApp(firebaseConfig); const db = firebase.firestore();
    const roleOrder = { "MD": 1, "Manager": 2, "Leader": 3, "Co-Leader": 4, "Helper": 5 };

    function showTab(t) { 
        document.querySelectorAll('.container > div').forEach(el => el.classList.add('hidden')); document.getElementById(t+'Tab').classList.remove('hidden');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); document.getElementById('t-'+t).classList.add('active');
        if(t === 'home') updateFinance(); if(t === 'jobs') loadJobs(); if(t === 'staff') loadStaff();
        if(t === 'purchase') loadHistory('purchases', 'purHistory'); if(t === 'sale') loadHistory('sales', 'saleHistory');
        if(t === 'attendance') { document.getElementById('att-date').valueAsDate = new Date(); loadStaffForAttendance(); }
        if(t === 'service') loadStaffForService();
    }

    async function updateFinance() {
        const today = new Date().toISOString().split('T')[0]; document.getElementById('currentDateDisp').innerText = today;
        let jInc=0, sInc=0, pExp=0, tSal=0, dJ=0, dS=0, dSal=0, dP=0;
        const jSn = await db.collection("jobs").get(); jSn.forEach(d => { const dt = d.data(); if(dt.status === 'Done') { jInc += dt.cost||0; if(dt.date === today) dJ += dt.cost||0; } });
        const sSn = await db.collection("sales").get(); sSn.forEach(d => { const dt = d.data(); sInc += dt.price||0; let sD = dt.timestamp?.toDate().toISOString().split('T')[0]; if(sD === today) dS += dt.price||0; });
        const pSn = await db.collection("purchases").get(); pSn.forEach(d => { const dt = d.data(); pExp += dt.total||0; let pD = dt.timestamp?.toDate().toISOString().split('T')[0]; if(pD === today) dP += dt.total||0; });
        const stSn = await db.collection("staff").get(); const attSn = await db.collection("attendance").get();
        stSn.forEach(s => { attSn.forEach(a => { if(a.data().records?.find(r => r.name === s.data().name && r.status === 'Present')) { tSal += s.data().rate||0; if(a.data().date === today) dSal += s.data().rate||0; } }); });
        document.getElementById('dailyFinanceDisplay').innerHTML = `Income: <b>${(dJ+dS).toLocaleString()}</b> | Profit: <b style="color:var(--p-green);">${(dJ+dS-dP-dSal).toLocaleString()}</b>`;
        document.getElementById('monthlyStats').innerHTML = `Total Income: ${(jInc+sInc).toLocaleString()}<br>Net Profit: ${(jInc+sInc-pExp-tSal).toLocaleString()} MMK`;
    }

    function loadStaff() { db.collection("staff").get().then(snap => {
        let sArr = snap.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => roleOrder[a.role] - roleOrder[b.role]);
        document.getElementById('staffList').innerHTML = sArr.map(s => `<div class="card" onclick="openEditStaff('${s.id}')"><b>${s.name}</b> - ${s.role}</div>`).join('');
    }); }
    function openEditStaff(id) { db.collection("staff").doc(id).get().then(d => { const s = d.data(); document.getElementById('m-id').value = id; document.getElementById('m-name').value = s.name; document.getElementById('m-role').value = s.role; document.getElementById('m-rate').value = s.rate; document.getElementById('staffModal').style.display='flex'; }); }
    async function updateStaff() { await db.collection("staff").doc(document.getElementById('m-id').value).update({ name: document.getElementById('m-name').value, role: document.getElementById('m-role').value, rate: Number(document.getElementById('m-rate').value) }); closeModal('staffModal'); loadStaff(); }
    async function deleteStaff() { if(confirm("Delete?")) { await db.collection("staff").doc(document.getElementById('m-id').value).delete(); closeModal('staffModal'); loadStaff(); } }

    function loadJobs() { db.collection("jobs").orderBy("timestamp", "desc").get().then(snap => {
        document.getElementById('jobMasterList').innerHTML = snap.docs.map(doc => `<div class="card" onclick="openJobDetail('${doc.id}')"><b>${doc.data().name}</b><br><small>${doc.data().date}</small> <span class="status-badge ${doc.data().status==='Done'?'bg-done':'bg-pending'}">${doc.data().status}</span></div>`).join('');
    }); }
    function openJobDetail(id) { db.collection("jobs").doc(id).get().then(doc => { const d = doc.data(); window.currentJobId = id; document.getElementById('jobDetailView').innerHTML = `Customer: ${d.name}<br>Staff: ${d.staff?.join(', ')}`; document.getElementById('edit-j-cost').value = d.cost; document.getElementById('edit-j-status').value = d.status; document.getElementById('jobModal').style.display = 'flex'; }); }
    async function updateJob() { await db.collection("jobs").doc(window.currentJobId).update({ cost: Number(document.getElementById('edit-j-cost').value), status: document.getElementById('edit-j-status').value }); closeModal('jobModal'); loadJobs(); updateFinance(); }
    async function deleteJob() { if(confirm("Delete Job?")) { await db.collection("jobs").doc(window.currentJobId).delete(); closeModal('jobModal'); loadJobs(); updateFinance(); } }

    function loadStaffForService() { db.collection("staff").get().then(snap => {
        let sArr = snap.docs.map(d => d.data().name).sort();
        document.getElementById('staffChecks').innerHTML = sArr.map(s => `<label style="color:var(--text);"><input type="checkbox" class="st-check" value="${s}"> ${s}</label>`).join('');
    }); }

    function loadStaffForAttendance() { db.collection("staff").get().then(snap => {
        let sArr = snap.docs.map(d => d.data()).sort((a,b) => roleOrder[a.role] - roleOrder[b.role]);
        document.getElementById('attTableContainer').innerHTML = sArr.map(s => `<div class="st-row"><b>${s.name}</b> <select class="att-sel" data-name="${s.name}"><option>Present</option><option>Absent</option></select></div>`).join('');
    }); }

    function loadHistory(col, divId) { db.collection(col).orderBy("timestamp", "desc").get().then(snap => {
        document.getElementById(divId).innerHTML = snap.docs.map(d => `<div class="history-item"><span>${d.data().name}</span> <b>${(d.data().total||d.data().price).toLocaleString()}</b></div>`).join('');
    }); }

    async function saveJob() { 
        const staff = []; document.querySelectorAll('.st-check:checked').forEach(c => staff.push(c.value));
        await db.collection("jobs").add({ name: document.getElementById('j-name').value, staff, date: document.getElementById('j-date').value, cost: Number(document.getElementById('j-cost').value), status: document.getElementById('j-status').value, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
        alert("Saved!"); showTab('jobs');
    }
    async function savePur() { await db.collection("purchases").add({ name: document.getElementById('p-name').value, total: Number(document.getElementById('p-total').value), timestamp: firebase.firestore.FieldValue.serverTimestamp() }); alert("Saved!"); loadHistory('purchases', 'purHistory'); updateFinance(); }
    async function saveSale() { await db.collection("sales").add({ name: document.getElementById('s-name').value, price: Number(document.getElementById('s-total').value), timestamp: firebase.firestore.FieldValue.serverTimestamp() }); alert("Saved!"); loadHistory('sales', 'saleHistory'); updateFinance(); }
    async function addStaff() { await db.collection("staff").add({ name: document.getElementById('st-name').value, role: document.getElementById('st-role').value, rate: Number(document.getElementById('st-rate').value) }); alert("Added!"); loadStaff(); }
    async function saveAttendance() { const records = []; document.querySelectorAll('.att-sel').forEach(s => records.push({name: s.dataset.name, status: s.value})); await db.collection("attendance").add({ date: document.getElementById('att-date').value, records, timestamp: firebase.firestore.FieldValue.serverTimestamp() }); alert("Saved!"); }

    async function exportMasterPDF() { 
        const { jsPDF } = window.jspdf; const doc = new jsPDF(); 
        doc.text("Oasis AC Master Report", 14, 20); doc.text(document.getElementById('monthlyStats').innerText.split('\n'), 14, 30);
        const b64 = doc.output('datauristring'); if (window.ReactNativeWebView) window.ReactNativeWebView.postMessage(b64); else doc.save('Report.pdf');
    }
    function calcPur() { document.getElementById('p-total').value = document.getElementById('p-qty').value * document.getElementById('p-price').value; }
    function calcSale() { document.getElementById('s-total').value = document.getElementById('s-qty').value * document.getElementById('s-price').value; }
    function previewImg(input, id) { if(input.files && input.files[0]) { let r = new FileReader(); r.onload = e => document.getElementById(id).src = e.target.result; r.readAsDataURL(input.files[0]); } }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme')==='dark'?'light':'dark'); }
    updateFinance();
</script>
</body></html>
