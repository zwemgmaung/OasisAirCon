<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis Master Sync v3.7.0</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
    <style>
        :root { --p-green: #28a745; --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333; --accent: #4285f4; }
        [data-theme="light"] { --bg: #ffffff; --text: #333; --card: #f8f9fa; --border: #ddd; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 90px; }
        
        /* Persistent Login Design */
        #login-screen { position: fixed; inset: 0; background: radial-gradient(circle at center, #1e1e1e, #000); display: flex; align-items: center; justify-content: center; z-index: 6000; padding: 20px; }
        #login-box { background: rgba(30, 30, 30, 0.9); backdrop-filter: blur(10px); padding: 40px 30px; border-radius: 30px; border: 1px solid var(--p-green); text-align: center; width: 100%; max-width: 380px; }
        .login-logo { width: 90px; height: 90px; border-radius: 50%; border: 3px solid var(--p-green); margin-bottom: 20px; }
        
        .header { background: var(--p-green); color: white; padding: 8px 15px; display: flex; align-items: center; position: sticky; top: 0; z-index: 2000; height: 65px; gap: 12px; }
        .logo-img { width: 48px; height: 48px; border-radius: 50%; border: 2px solid white; cursor: pointer; }
        
        .nav-tabs { display: flex; overflow-x: auto; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 65px; z-index: 1000; scrollbar-width: none; }
        .tab-btn { padding: 15px 20px; flex: none; cursor: pointer; font-weight: bold; font-size: 11px; color: #888; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--p-green); border-bottom-color: var(--p-green); background: rgba(40, 167, 69, 0.1); }
        
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .card { background: var(--card); padding: 18px; border-radius: 15px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }
        input, select, textarea { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 12px; background: var(--bg); color: var(--text); box-sizing: border-box; margin-bottom: 12px; }
        
        .btn-green { background: var(--p-green); color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; font-weight: bold; cursor: pointer; }
        .btn-edit { position: absolute; right: 15px; top: 15px; background: var(--accent); color: white; border: none; padding: 5px 12px; border-radius: 8px; font-size: 11px; }
        .st-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 0.5px solid var(--border); font-size: 14px; }
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 5000; padding: 20px; }
        .modal-content { background: var(--card); padding: 25px; border-radius: 20px; width: 100%; max-width: 450px; max-height: 85vh; overflow-y: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
<div id="login-screen">
    <div id="login-box">
        <img src="1000064267.png" class="login-logo">
        <h2 style="color:var(--p-green);">Oasis Master</h2>
        <input type="text" id="l-user" placeholder="Username">
        <input type="password" id="l-pass" placeholder="Password">
        <button class="btn-green" onclick="doLogin()">AUTHENTICATE</button>
    </div>
</div>

<div class="header">
    <img src="1000064267.png" class="logo-img">
    <div><b style="font-size:16px;">Ko Htay Aung (Oasis)</b><br><small>AC Sales & Service</small></div>
</div>

<div class="nav-tabs">
    <div class="tab-btn active" onclick="showTab('home')" id="t-home">HOME</div>
    <div class="tab-btn" onclick="showTab('jobs')" id="t-jobs">JOBS</div>
    <div class="tab-btn" onclick="showTab('service')" id="t-service">ENTRY</div>
    <div class="tab-btn" onclick="showTab('purchase')" id="t-purchase">PURCHASE</div>
    <div class="tab-btn" onclick="showTab('sale')" id="t-sale">SALE</div>
    <div class="tab-btn" onclick="showTab('staff')" id="t-staff">STAFF</div>
    <div class="tab-btn" onclick="showTab('attendance')" id="t-attendance">ATTEND</div>
    <div class="tab-btn" onclick="showTab('settings')" id="t-settings">SETTINGS</div>
</div>

<div class="container">
    <div id="homeTab">
        <div class="card"><h3>Daily Dashboard</h3><div id="dFin">Loading...</div></div>
        <div class="card"><h3>Monthly Summary</h3><div id="mFin">Loading...</div>
            <button class="btn-green" style="margin-top:15px;" onclick="generateDetailedPDF()">Download A3 Full Report</button>
        </div>
    </div>
    <div id="jobsTab" class="hidden"><div id="jobList"></div></div>
    <div id="serviceTab" class="hidden">
        <div class="card">
            <h3>Service Entry</h3>
            <input type="text" id="j-n" placeholder="Customer Name">
            <select id="j-t"><option>Air-Con</option><option>Refrigerator</option><option>Washing Machine</option><option>Chiller</option></select>
            <textarea id="j-d" placeholder="Problem Details"></textarea>
            <div id="staffChecks" style="border:1px solid #333; padding:10px; border-radius:10px; margin-bottom:10px;"></div>
            <input type="number" id="j-c" placeholder="Total Cost">
            <button class="btn-green" onclick="saveJob()">SAVE</button>
        </div>
    </div>
    <div id="purchaseTab" class="hidden"><div id="pHist"></div></div>
    <div id="saleTab" class="hidden"><div id="sHist"></div></div>
    <div id="staffTab" class="hidden"><div id="staffList"></div></div>
    <div id="attendanceTab" class="hidden"><div class="card"><h3>Attendance</h3><div id="attTable"></div><button class="btn-green" id="saveAttBtn" onclick="saveAttendance()">SUBMIT</button></div></div>
    <div id="settingsTab" class="hidden"><div class="card" style="text-align:center;"><button class="btn-green" style="background:#c00;" onclick="doLogout()">LOGOUT</button></div></div>
</div>

<div id="editModal" class="modal"><div class="modal-content"><h3 id="editTitle">Edit</h3><div id="editFields"></div><button class="btn-green" id="updateBtn">UPDATE</button><button onclick="closeModal('editModal')" style="width:100%; margin-top:10px;">CANCEL</button></div></div>
<script>
    const firebaseConfig = { apiKey: "AIzaSyAOgPQkaq0mLdzi9jNZK-oRCEa_VsmD_cE", authDomain: "oasis-ac-service.firebaseapp.com", projectId: "oasis-ac-service", storageBucket: "oasis-ac-service.firebasestorage.app", messagingSenderId: "1039018990829", appId: "1:1039018990829:web:bffe0ea0269bfbded780e4" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // Persistent Login Logic (Like Twitter/X)
    if(localStorage.getItem('OasisLogged') === 'true') document.getElementById('login-screen').style.display='none';
    function doLogin() {
        const u = document.getElementById('l-user').value; const p = document.getElementById('l-pass').value;
        if(u === "Oasis" && p === "oasis@2000") { localStorage.setItem('OasisLogged','true'); location.reload(); }
    }
    function doLogout() { localStorage.removeItem('OasisLogged'); location.reload(); }

    // Attendance & MD Logic
    function initAttendance() {
        const now = new Date(); const hour = now.getHours();
        if(hour < 11) { document.getElementById('saveAttBtn').disabled = true; }
        loadStaffForAtt();
    }
    async function loadStaffForAtt() {
        const sn = await db.collection("staff").get();
        // MD မပါဘဲ ကျန်ဝန်ထမ်းများ စာရင်းပြရန်
        const list = sn.docs.filter(d => d.data().role !== 'MD').map(d => ({name: d.data().name, status: 'Present'}));
        document.getElementById('attTable').innerHTML = list.map(r => `<div class="st-row"><span>${r.name}</span><select class="att-sel" data-name="${r.name}"><option>Present</option><option>Absence</option></select></div>`).join('');
    }

    // A3 Full PDF Report Logic (Firebase Data Sync)
    async function generateDetailedPDF() {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('p', 'mm', 'a3'); // A3 Size
        doc.setFontSize(20); doc.text("Oasis AC Sales & Service - Business Report", 15, 20);
        
        // 1. Service Jobs Table
        const jSnap = await db.collection("jobs").get();
        const jBody = jSnap.docs.map(d => { 
            const v = d.data(); 
            return [v.date, v.name, v.type, v.staff.join(','), v.cost, v.status]; 
        });
        doc.autoTable({ startY: 30, head: [['Date','Customer','Type','Technicians','Cost','Status']], body: jBody });

        // 2. Sales & Purchases
        const sSnap = await db.collection("sales").get();
        const pSnap = await db.collection("purchases").get();
        const invBody = [];
        sSnap.forEach(s => invBody.push([s.data().timestamp?.toDate().toLocaleDateString(), 'SALE', s.data().buyer, s.data().price]));
        pSnap.forEach(p => invBody.push([p.data().timestamp?.toDate().toLocaleDateString(), 'PURCHASE', p.data().shop, p.data().total]));
        doc.autoTable({ startY: doc.lastAutoTable.finalY + 15, head: [['Date','Type','Name','Amount']], body: invBody });

        // 3. Attendance Section (Staff List မပါဘဲ Attendance ပဲထည့်ခြင်း)
        const aSnap = await db.collection("attendance").orderBy("date","desc").limit(5).get();
        const aBody = [];
        aSnap.forEach(a => a.data().records.forEach(r => aBody.push([a.data().date, r.name, r.status])));
        doc.autoTable({ startY: doc.lastAutoTable.finalY + 15, head: [['Date','Staff','Status']], body: aBody });

        doc.save(`Oasis_A3_Report_${new Date().toLocaleDateString()}.pdf`);
    }

    // Finance Update Logic
    async function updateFinance() {
        const today = new Date().toISOString().split('T')[0];
        const [jobs, staff, att] = await Promise.all([db.collection("jobs").get(), db.collection("staff").get(), db.collection("attendance").get()]);
        
        let d_coll = 0, d_sal = 0;
        const rates = {}; staff.forEach(s => rates[s.data().name] = s.data().rate || 0);

        // Daily Salary calculation (Only for Present)
        att.forEach(a => {
            if(a.data().date === today) {
                a.data().records.forEach(r => { if(r.status === 'Present') d_sal += rates[r.name] || 0; });
            }
        });

        jobs.forEach(j => { if(j.data().date === today) d_coll += j.data().paid || 0; });

        document.getElementById('dFin').innerHTML = `Collected: ${d_coll} | Salary: ${d_sal} | Profit: ${d_coll - d_sal}`;
    }

    function showTab(t) {
        document.querySelectorAll('.container > div').forEach(el => el.classList.add('hidden'));
        document.getElementById(t+'Tab').classList.remove('hidden');
        if(t==='home') updateFinance();
        if(t==='attendance') initAttendance();
    }
</script>
</body>
</html>
