<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Oasis AC System</title>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.15.0/firebase-firestore-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --p-green: #28a745; --bg: #ffffff; --text: #333; --card: #f8f9fa; --border: #ddd; }
        [data-theme="dark"] { --bg: #121212; --text: #e0e0e0; --card: #1e1e1e; --border: #333; }
        body { font-family: Arial, sans-serif; margin: 0; background: var(--bg); color: var(--text); padding-bottom: 50px; }
        .header { background: var(--p-green); color: white; padding: 10px 15px; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 1001; }
        .logo-box { display: flex; align-items: center; gap: 10px; }
        .logo-img { width: 40px; height: 40px; border-radius: 50%; border: 2px solid white; object-fit: cover; background: white; }
        .nav-tabs { display: flex; overflow-x: auto; background: var(--card); border-bottom: 1px solid var(--border); position: sticky; top: 60px; z-index: 1000; }
        .tab-btn { padding: 15px; flex: 1; text-align: center; cursor: pointer; font-weight: bold; font-size: 12px; color: #666; border-bottom: 3px solid transparent; }
        .tab-btn.active { color: var(--p-green); border-bottom-color: var(--p-green); }
        .container { padding: 15px; max-width: 800px; margin: auto; }
        .card { background: var(--card); padding: 15px; border-radius: 10px; margin-bottom: 15px; border: 1px solid var(--border); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; font-size: 13px; color: var(--p-green); }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); box-sizing: border-box; }
        .btn-green { background: var(--p-green); color: white; border: none; padding: 12px; border-radius: 6px; width: 100%; font-weight: bold; cursor: pointer; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .hidden { display: none; }
    </style>
</head>
<body data-theme="light">

<div class="header">
    <div class="logo-box">
        <img src="1000064267.png" class="logo-img" alt="Logo">
        <span style="font-weight: bold; font-size: 14px;">OASIS AC SYSTEM</span>
    </div>
    <div style="display: flex; gap: 10px; align-items: center;">
        <button onclick="toggleTheme()" style="background: none; border: none; cursor: pointer; font-size: 16px;">🌓</button>
    </div>
</div>

<div class="nav-tabs">
    <div class="tab-btn active" onclick="showTab('home')" id="t-home">HOME</div>
    <div class="tab-btn" onclick="showTab('service')" id="t-service">SERVICE</div>
    <div class="tab-btn" onclick="showTab('staff')" id="t-staff">STAFF</div>
    <div class="tab-btn" onclick="showTab('settings')" id="t-settings">SETTINGS</div>
</div>

<div class="container">
    <div id="homeTab">
        <div class="card">
            <h3>Dashboard</h3>
            <canvas id="jobChart" style="max-height: 200px;"></canvas>
            <div style="text-align: right; color: var(--p-green); font-size: 11px; margin-top: 5px;">Online - Synced</div>
        </div>
    </div>

    <div id="serviceTab" class="hidden">
        <div class="card">
            <h3>New Service Entry</h3>
            <div class="grid-2">
                <div class="form-group"><label>Customer Name</label><input type="text" id="j-name"></div>
                <div class="form-group"><label>Phone</label><input type="text" id="j-phone"></div>
            </div>
            <div class="form-group"><label>Address</label><textarea id="j-addr" rows="2"></textarea></div>
            <div class="form-group"><label>Appliance</label><select id="j-app"><option>Air-Con</option><option>Refrigerator</option></select></div>
            <div class="form-group"><label>Issue</label><textarea id="j-issue" rows="2"></textarea></div>
            <button class="btn-green" onclick="saveJob()">SAVE RECORD</button>
        </div>
    </div>

    <div id="staffTab" class="hidden">
        <div class="card">
            <h3>Add Staff</h3>
            <div class="form-group"><label>Name</label><input type="text" id="st-name"></div>
            <div class="grid-2">
                <div class="form-group">
                    <label>Role</label>
                    <select id="st-role"><option>Technician</option><option>Helper</option><option>Leader</option></select>
                </div>
                <div class="form-group"><label>Phone</label><input type="text" id="st-phone"></div>
            </div>
            <div class="form-group"><label>Address</label><input type="text" id="st-addr"></div>
            <div class="form-group"><label>Remark</label><textarea id="st-remark" rows="2"></textarea></div>
            <button class="btn-green" onclick="addStaff()" id="btn-stf-save">ADD STAFF</button>
        </div>
        <div class="card">
            <h4>Staff Directory</h4>
            <div id="staffList"></div>
        </div>
    </div>

    <div id="settingsTab" class="hidden">
        <div class="card" style="text-align: center;">
            <h3>Settings</h3>
            <p>Developed by <strong>Zwe Maung Maung</strong></p>
            <button class="btn-green" onclick="logout()" style="background: #dc3545;">LOGOUT</button>
        </div>
    </div>
</div>

<script>
    const firebaseConfig = {
      apiKey: "AIzaSyAOgPQkaq0mLdzi9jNZK-oRCEa_VsmD_cE",
      authDomain: "oasis-ac-service.firebaseapp.com",
      projectId: "oasis-ac-service",
      storageBucket: "oasis-ac-service.firebasestorage.app",
      messagingSenderId: "1039018990829",
      appId: "1:1039018990829:web:bffe0ea0269bfbded780e4"
    };
    if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
    const db = firebase.firestore();

    let isStaffLoading = false;

    function showTab(t) {
        ['home', 'service', 'staff', 'settings'].forEach(id => document.getElementById(id + 'Tab').classList.add('hidden'));
        document.getElementById(t + 'Tab').classList.remove('hidden');
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('t-' + t).classList.add('active');

        if (t === 'staff') loadStaff();
    }

    function toggleTheme() { document.body.setAttribute('data-theme', document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light'); }
    function logout() { localStorage.removeItem('isLoggedIn'); location.href = 'index.html'; }

    async function addStaff() {
        const btn = document.getElementById('btn-stf-save');
        btn.innerText = "Saving...";
        const data = {
            name: document.getElementById('st-name').value,
            role: document.getElementById('st-role').value,
            phone: document.getElementById('st-phone').value,
            addr: document.getElementById('st-addr').value,
            remark: document.getElementById('st-remark').value,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        if(!data.name) { alert("Enter Name"); btn.innerText = "ADD STAFF"; return; }
        
        await db.collection("staff").add(data);
        alert("Staff Added!");
        btn.innerText = "ADD STAFF";
        document.getElementById('st-name').value = '';
        loadStaff();
    }

    function loadStaff() {
        const list = document.getElementById('staffList');
        list.innerHTML = "Loading...";
        // .get() instead of .onSnapshot() to prevent freeze
        db.collection("staff").orderBy("createdAt", "desc").get().then(snap => {
            if (snap.empty) { list.innerHTML = "No data."; return; }
            list.innerHTML = snap.docs.map(doc => {
                const s = doc.data();
                return `<div style="padding:10px; border-bottom:1px solid var(--border); font-size:13px;">
                    <strong>${s.name}</strong> (${s.role})<br>📞 ${s.phone || '-'}<br>📍 ${s.addr || '-'}</div>`;
            }).join('');
        });
    }

    async function saveJob() {
        const data = {
            name: document.getElementById('j-name').value,
            phone: document.getElementById('j-phone').value,
            timestamp: firebase.firestore.FieldValue.serverTimestamp()
        };
        await db.collection("jobs").add(data);
        alert("Saved!");
        location.reload();
    }

    window.onload = () => { if(!localStorage.getItem('isLoggedIn')) location.href='index.html'; };
</script>
</body>
</html>
